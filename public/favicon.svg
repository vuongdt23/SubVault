<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- projector-black rounded tile -->
  <rect width="64" height="64" rx="12" fill="#0b0a08"/>
  <!-- film strip body -->
  <rect x="16" y="8" width="32" height="48" rx="2" fill="#16130f" stroke="#f0b02f" stroke-width="2.5"/>
  <!-- sprocket holes, left + right columns -->
  <g fill="#f0b02f">
    <rect x="10" y="12" width="4" height="6" rx="1"/>
    <rect x="10" y="24" width="4" height="6" rx="1"/>
    <rect x="10" y="36" width="4" height="6" rx="1"/>
    <rect x="10" y="48" width="4" height="6" rx="1"/>
    <rect x="50" y="12" width="4" height="6" rx="1"/>
    <rect x="50" y="24" width="4" height="6" rx="1"/>
    <rect x="50" y="36" width="4" height="6" rx="1"/>
    <rect x="50" y="48" width="4" height="6" rx="1"/>
  </g>
  <!-- stacked subtitle caption lines, brightest at the bottom -->
  <rect x="24" y="19" width="16" height="4" rx="1.5" fill="#6d6353"/>
  <rect x="26" y="30" width="12" height="4" rx="1.5" fill="#a2957f"/>
  <rect x="22" y="41" width="20" height="5" rx="1.5" fill="#f3ecdd"/>
</svg>
