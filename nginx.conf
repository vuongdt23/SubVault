server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Issue relative redirects so the trailing-slash redirect (e.g.
  # /title?slug=x -> /title/?slug=x) preserves the client's host:port instead
  # of rewriting to the container's port 80.
  absolute_redirect off;

  gzip on;
  gzip_types application/json application/javascript text/css;
  gzip_min_length 1024;

  # Serve the built site.
  location / {
    try_files $uri $uri/ =404;
  }

  # Long-cache immutable data + assets.
  location /data/ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Raw subtitle archives from the mounted subtitles volume.
  # On-disk layout has a DOUBLED lang dir plus a space:
  #   {lang}/{lang}/{lang} subtitles/{slug}/{file}
  # so /files/{lang}/{slug}/{file}
  #   -> /subtitles/{lang}/{lang}/{lang} subtitles/{slug}/{file}
  # `root` (not `alias`) is used so the matched URI is appended to the root and
  # the rewritten path stays absolute and predictable under try_files.
  location ~ ^/files/([^/]+)/(.+)$ {
    root /subtitles;
    try_files "/$1/$1/$1 subtitles/$2" =404;
    add_header Content-Disposition "attachment";
  }
}
