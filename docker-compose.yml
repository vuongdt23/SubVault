services:
  # One-shot: generate public/data from the real metadata, then exit.
  indexer:
    image: node:22-alpine
    working_dir: /app
    environment:
      SUBTITLES_ROOT: /subtitles
    volumes:
      - ./:/app
      # Point SUBTITLES_ROOT at the directory holding your extracted
      # {lang}/{lang}/{lang}_metadata.json tree (see .env / .env.example).
      - ${SUBTITLES_ROOT:-./subtitles}:/subtitles:ro
    command: sh -c "npm ci && npm run gen:index"

  web:
    build: .
    depends_on:
      indexer:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    volumes:
      # Serve raw archives directly from the host data.
      - ${SUBTITLES_ROOT:-./subtitles}:/subtitles:ro
    restart: unless-stopped
